<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Best Daily Deals - SmartCart India 🔥</title>
    <style>
        :root { --bg: #0d0d11; --card-bg: #16161f; --text: #f3f4f6; --accent: #ff9900; --border: #262636; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        /* ─── SOCIAL LINKS GRID STYLES ─── */
        .social-links-container {display: flex; justify-content: center; gap: 10px; margin-top: 15px; width: 100%;}
        .social-link {flex: 1; max-width: 120px; display: flex; align-items: center; justify-content: center; padding: 8px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; text-decoration: none; color: #ffffff; transition: transform 0.2s ease, filter 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.1);}
        .social-link:hover {transform: translateY(-2px); filter: brightness(1.2);}
        /* Platform Brand Specific Backgrounds */
        .yt-link { background: #ff0000; }
        .tg-link { background: #0088cc; }
        .ig-link { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .header-panel { text-align: center; margin: 25px 0; max-width: 480px; width: 100%; }
        .header-panel h1 { font-size: 1.5rem; color: var(--text); margin-bottom: 5px; }
        .header-panel p { font-size: 0.9rem; color: #8b8ba7; }

        /* ─── CONVERTER SECTION STYLES ─── */
        .converter-container { max-width: 480px; width: 100%; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .converter-title { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
        .input-group { display: flex; gap: 8px; }
        .url-input { flex-grow: 1; background: #0d0d11; border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-size: 0.9rem; outline: none; }
        .url-input:focus { border-color: var(--accent); }
        .convert-btn { background: var(--accent); color: #000; border: none; font-size: 0.9rem; font-weight: 700; padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
        .convert-btn:hover { opacity: 0.9; }
        
        /* Result Box Styles */
        .result-container { display: none; background: rgba(255, 153, 0, 0.05); border: 1px dashed var(--accent); border-radius: 8px; padding: 12px; margin-top: 5px; text-align: center; }
        .result-link-btn { display: inline-block; background: var(--accent); color: #000; text-decoration: none; font-size: 0.9rem; font-weight: 700; padding: 10px 20px; border-radius: 6px; transition: opacity 0.2s; width: 100%; text-align: center; }
        .result-link-btn:hover { opacity: 0.9; }

        .deals-container { max-width: 480px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .deal-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; padding: 12px; gap: 12px; align-items: center; transition: transform 0.2s; }
        .deal-card:hover { transform: scale(1.01); border-color: var(--accent); }
        .deal-thumb { width: 85px; height: 85px; object-fit: contain; background: #fff; border-radius: 8px; padding: 4px; flex-shrink: 0; }
        .deal-details { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; height: 100%; min-width: 0; }
        .deal-title { font-size: 0.95rem; font-weight: 600; color: #e5e7eb; line-height: 1.3; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .deal-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .deal-price { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .deal-btn { background: var(--accent); color: #000; text-decoration: none; font-size: 0.85rem; font-weight: 700; padding: 8px 14px; border-radius: 6px; transition: opacity 0.2s; }
        .deal-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <script>
        const AFFILIATE_TAG = 'smartcart03b-21';

        function processUrl() {
            const rawUrlInput = document.getElementById('raw-url').value.trim();
            const resultBox = document.getElementById('result-box');
            const dealButton = document.getElementById('affiliate-deal-btn');
            
            if (!rawUrlInput) {
                alert("Please enter a valid Amazon URL!");
                return;
            }

            let finalUrl = "";
            const asinRegex = /\/([A-Z0-9]{10})(?:[\/?]|$)/i;
            const match = rawUrlInput.match(asinRegex);

            if (match && match[1]) {
                const asin = match[1];
                finalUrl = `https://www.amazon.in/dp/${asin}?tag=${AFFILIATE_TAG}`;
            } else {
                try {
                    let urlObj = new URL(rawUrlInput);
                    urlObj.searchParams.set('tag', AFFILIATE_TAG);
                    finalUrl = urlObj.toString();
                } catch (e) {
                    const separator = rawUrlInput.includes('?') ? '&' : '?';
                    finalUrl = `${rawUrlInput}${separator}tag=${AFFILIATE_TAG}`;
                }
            }

            // Bind the final native URL directly to the anchor href attribute
            dealButton.href = finalUrl;
            
            // Show the result container element
            resultBox.style.display = "block";
        }
    </script>

    <div class="header-panel">
        <h1>🔥Best Daily Deals - SmartCart India🔥</h1>
        <p>Handpicked Premium Tech & Lifestyle Amazon Finds</p>
        
        <div class="social-links-container">
            <a href="https://www.youtube.com/@SmartCartIndiaOfficial" target="_blank" class="social-link yt-link">
                <span>🎬 YouTube</span>
            </a>
            <a href="https://t.me/smartCartIndiaOfficial" target="_blank" class="social-link tg-link">
                <span>✈️ Telegram</span>
            </a>
            <a href="https://www.instagram.com/smartcartindiaofficial" target="_blank" class="social-link ig-link">
                <span>📸 Instagram</span>
            </a>
        </div>
    </div>

    <!-- ─── CONVERTER BOX ─── -->
    <div class="converter-container">
        <div class="converter-title">Convert Amazon URL to Affiliate</div>
        <div class="input-group">
            <input type="text" id="raw-url" class="url-input" placeholder="Paste Amazon Link (Long or Short)...">
            <button class="convert-btn" onclick="processUrl()">Convert</button>
        </div>
        
        <!-- Generated HTML Anchor Element instead of a JavaScript trigger button -->
        <div id="result-box" class="result-container">
            <a id="affiliate-deal-btn" class="result-link-btn" href="#" target="_blank">Get Deal ➔</a>
        </div>
    </div>

    <div class="deals-container" id="deals-wrapper">
    
    </div>
</body>
</html>
